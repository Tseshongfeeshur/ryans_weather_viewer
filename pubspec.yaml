name: ryans_weather_viewer
description: "Pixel 天气的非官方 Flutter 重写。"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0
  system_theme: ^3.2.0
  flex_color_scheme: ^8.4.0
  flutter_animate: ^4.5.2
  reorderable_staggered_scroll_view: ^0.0.2
  rive: ^0.14.5
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  # m3e_core: ^0.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
  - family: MiSans
    fonts:
      - asset: assets/fonts/MiSansVF.ttf